<script>
(function() {
  var messages = [
    'still here?',
    'go touch grass',
    'hire me already',
    'echo "hello world"',
    'segfault incoming...',
    'why are you still reading this',
    'ctrl+c to quit life',
    'have you tried turning it off and on again?',
    'malloc failed. just like my life.',
    'this website has more personality than me'
  ];

  var idleTimer = null;
  var idleInterval = null;
  var isTyping = false;

  function getCmd() {
    return document.querySelector('.terminal-cmd');
  }

  function getCursor() {
    return document.querySelector('.terminal-cursor');
  }

  function typeMessage(text, cb) {
    var cmd = getCmd();
    var cursor = getCursor();
    if (!cmd || !cursor) return;

    var idleSpan = document.createElement('span');
    idleSpan.className = 'idle-text';
    cmd.parentNode.insertBefore(idleSpan, cursor);

    var i = 0;
    isTyping = true;
    var typeInt = setInterval(function() {
      idleSpan.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(typeInt);
        setTimeout(function() { eraseMessage(idleSpan, cb); }, 2000);
      }
    }, 70);
  }

  function eraseMessage(span, cb) {
    var txt = span.textContent;
    var eraseInt = setInterval(function() {
      txt = txt.slice(0, -1);
      span.textContent = txt;
      if (txt.length === 0) {
        clearInterval(eraseInt);
        span.remove();
        isTyping = false;
        if (cb) cb();
      }
    }, 35);
  }

  function startIdle() {
    if (isTyping) return;
    var msg = messages[Math.floor(Math.random() * messages.length)];
    typeMessage(' ' + msg, function() {
      idleInterval = setTimeout(startIdle, 8000);
    });
  }

  function resetIdle() {
    clearTimeout(idleTimer);
    clearTimeout(idleInterval);
    idleTimer = setTimeout(startIdle, 30000);
  }

  document.addEventListener('mousemove', resetIdle);
  document.addEventListener('keydown', resetIdle);
  document.addEventListener('scroll', resetIdle);
  resetIdle();
})();

// Profile photo hover bubble
(function() {
  var photo = document.getElementById('profile-hover');
  var bubble = document.getElementById('profile-bubble');
  if (!photo || !bubble) return;

  var lines = [
    "don't touch me, that's rude",
    "personal space, ever heard of it?",
    "I didn't consent to this hover",
    "stop staring, it's creepy",
    "yes I'm real, not an AI avatar",
    "my face is up here... wait",
    "hover somewhere else weirdo",
    "you just triggered my firewall",
    "403 Forbidden: face access denied",
    "are you trying to inspect my element?"
  ];

  var lastIndex = -1;

  photo.addEventListener('mouseenter', function() {
    var idx;
    do {
      idx = Math.floor(Math.random() * lines.length);
    } while (idx === lastIndex && lines.length > 1);
    lastIndex = idx;

    bubble.textContent = lines[idx];
    bubble.classList.add('visible');
  });

  photo.addEventListener('mouseleave', function() {
    bubble.classList.remove('visible');
  });
})();
</script>
